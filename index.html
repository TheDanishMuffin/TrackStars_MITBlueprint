<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🏃 Race Live — Spectator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --sky:#5ec8f0; --ground:#7ec850; --ground-dark:#5aaa30;
  --white:#fff; --black:#111;
  --green-line:#00843d; --red-line:#da291c; --orange-line:#ed8b00;
  --shadow:0 5px 0 rgba(0,0,0,.2); --shadow-deep:0 7px 0 rgba(0,0,0,.22);
}
html,body { height:100%; overflow:hidden; touch-action:none; }
body { font-family:'Nunito',sans-serif; background:var(--sky); display:flex; flex-direction:column; position:relative; }

/* CLOUDS */
.clouds { position:fixed; top:0; left:0; right:0; height:45%; pointer-events:none; z-index:0; overflow:hidden; }
.cloud { position:absolute; background:white; border-radius:50px; opacity:.88; }
.cloud::before,.cloud::after { content:''; position:absolute; background:white; border-radius:50%; }
.c1{width:110px;height:36px;top:6%;left:2%;animation:drift 18s linear infinite}
.c1::before{width:55px;height:55px;top:-27px;left:15px}.c1::after{width:40px;height:40px;top:-18px;left:46px}
.c2{width:80px;height:26px;top:18%;left:55%;animation:drift 24s linear infinite 4s}
.c2::before{width:40px;height:40px;top:-20px;left:8px}.c2::after{width:30px;height:30px;top:-14px;left:35px}
.c3{width:140px;height:42px;top:4%;left:70%;animation:drift 20s linear infinite 8s}
.c3::before{width:65px;height:65px;top:-32px;left:20px}.c3::after{width:50px;height:50px;top:-22px;left:65px}
@keyframes drift{from{transform:translateX(0)}to{transform:translateX(-110vw)}}

/* GROUND */
.ground-strip { position:fixed; bottom:0; left:0; right:0; height:60px; background:var(--ground); border-top:4px solid var(--ground-dark); z-index:0; }
.ground-strip::before { content:''; position:absolute; top:-4px; left:0; right:0; height:4px; background:repeating-linear-gradient(90deg,transparent 0,transparent 24px,rgba(255,255,255,.3) 24px,rgba(255,255,255,.3) 36px); animation:gs .3s linear infinite; }
@keyframes gs{to{background-position:-36px 0}}

/* PARTICLES */
#sp-particles { position:fixed; inset:0; pointer-events:none; z-index:5; }

/* LAYOUT */
.spec-page { position:relative; z-index:1; height:100%; display:flex; flex-direction:column; padding:12px 14px 70px; gap:10px; overflow:hidden; }

/* HEADER BAR */
.spec-header { display:flex; align-items:center; justify-content:space-between; background:var(--white); border:3px solid var(--black); border-radius:16px; padding:10px 16px; box-shadow:var(--shadow); flex-shrink:0; }
.spec-title { font-family:'Bebas Neue',sans-serif; font-size:1.6rem; letter-spacing:.06em; color:var(--black); line-height:1; }
.spec-sub   { font-size:.65rem; font-weight:800; color:#888; }
.spec-live  { display:flex; align-items:center; gap:6px; background:var(--black); color:white; padding:6px 14px; border-radius:100px; font-size:.65rem; font-weight:900; letter-spacing:.14em; }
.ldot { width:7px; height:7px; border-radius:50%; background:#00ff87; box-shadow:0 0 7px #00ff87; animation:blink 1.3s infinite; }
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

/* BIG SPEED */
.spec-speed-card { background:var(--black); border:3px solid var(--black); border-radius:18px; box-shadow:var(--shadow-deep); padding:14px 20px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.spec-speed-card.shake { animation:shake .3s ease; }
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
#sp-big { font-family:'Bebas Neue',sans-serif; font-size:clamp(60px,18vw,110px); line-height:.85; color:white; transition:color .4s; }
.sp-right { text-align:right; }
.sp-kmh   { font-family:'Bebas Neue',sans-serif; font-size:1.3rem; color:#00ff87; }
.sp-ms    { font-family:'DM Mono',monospace; font-size:.65rem; color:rgba(255,255,255,.4); margin-top:3px; }
.sp-rank  { background:#1c1c1c; border:2px solid #2a2a2a; border-radius:12px; padding:10px 14px; text-align:center; min-width:110px; }
#sp-rnk-emoji { font-size:1.7rem; display:block; }
.sp-rnk-lbl   { font-size:.55rem; font-weight:900; letter-spacing:.12em; color:rgba(255,255,255,.4); display:block; margin-top:2px; }
#sp-rnk-name  { font-family:'Bebas Neue',sans-serif; font-size:.9rem; letter-spacing:.07em; color:white; display:block; }

/* TRACK CARDS */
.sp-trains { display:flex; flex-direction:column; gap:8px; flex:1; min-height:0; overflow:hidden; }

.sp-train-card { border:3px solid var(--black); border-radius:16px; overflow:hidden; box-shadow:var(--shadow-deep); flex:1; display:flex; flex-direction:column; min-height:0; }
.sp-train-top { padding:8px 14px; color:white; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.sp-train-name { font-family:'Bebas Neue',sans-serif; font-size:1.3rem; letter-spacing:.08em; }
.sp-train-tag  { font-family:'DM Mono',monospace; font-size:.7rem; opacity:.85; }
.sp-gap-chip   { font-size:.62rem; font-weight:900; letter-spacing:.1em; padding:3px 10px; border-radius:100px; }

/* scene */
.sp-scene { position:relative; flex:1; overflow:hidden; }
.sp-rail-bed { position:absolute; inset:0; background:repeating-linear-gradient(90deg,transparent 0,transparent 20px,rgba(255,255,255,.06) 20px,rgba(255,255,255,.06) 24px); }
.sp-ties { position:absolute; top:20%; bottom:10%; left:0; right:70px; background:repeating-linear-gradient(90deg,transparent 0,transparent 18px,rgba(255,255,255,.15) 18px,rgba(255,255,255,.15) 24px); animation:tiescroll .5s linear infinite; }
@keyframes tiescroll{to{background-position:-24px 0}}
.sp-rail-t,.sp-rail-b { position:absolute; left:0; right:70px; height:5px; border-radius:3px; background:#aaa; box-shadow:0 2px 4px rgba(0,0,0,.5); }
.sp-rail-t { top:28%; } .sp-rail-b { top:55%; }
.sp-rfill { position:absolute; left:0; top:22%; bottom:8%; border-radius:4px; transition:width .5s cubic-bezier(.34,1.3,.64,1); }
.sp-finish { position:absolute; right:30px; top:8%; bottom:8%; width:10px; background:repeating-linear-gradient(0deg,white 0,white 6px,black 6px,black 12px); border-radius:3px; opacity:.5; }
.sp-finish-flag { position:absolute; right:16px; top:5%; font-size:1.2rem; opacity:.6; }
.sp-mover { position:absolute; pointer-events:none; z-index:4; display:flex; align-items:center; transition:left .5s cubic-bezier(.34,1.3,.64,1); }
.sp-mover.sp-train { top:10%; bottom:10%; }
.sp-mover.sp-you   { top:50%; bottom:5%; }
.sp-mover-emoji { font-size:1.6rem; filter:drop-shadow(0 2px 4px rgba(0,0,0,.6)); animation:bob .8s ease-in-out infinite alternate; }
.sp-mover.sp-you .sp-mover-emoji { font-size:1.3rem; }
@keyframes bob{from{transform:translateY(0)}to{transform:translateY(-3px)}}
.sp-mtag { position:absolute; bottom:105%; left:50%; transform:translateX(-50%); font-size:.52rem; font-weight:900; white-space:nowrap; background:rgba(0,0,0,.65); color:white; padding:2px 5px; border-radius:5px; font-family:'DM Mono',monospace; }
.sp-mover.sp-you .sp-mtag { background:rgba(255,228,0,.9); color:#222; }

.tc-g .sp-train-top{background:var(--green-line)} .tc-g .sp-scene{background:#004d22} .tc-g .sp-rfill{background:linear-gradient(90deg,rgba(0,255,100,.3),rgba(0,255,100,.6));border:1px solid rgba(0,255,100,.4)}
.tc-r .sp-train-top{background:var(--red-line)}   .tc-r .sp-scene{background:#5a0f0a} .tc-r .sp-rfill{background:linear-gradient(90deg,rgba(255,80,80,.3),rgba(255,80,80,.6));border:1px solid rgba(255,80,80,.4)}
.tc-o .sp-train-top{background:var(--orange-line)} .tc-o .sp-scene{background:#5a2e00} .tc-o .sp-rfill{background:linear-gradient(90deg,rgba(255,170,50,.3),rgba(255,170,50,.6));border:1px solid rgba(255,170,50,.4)}
</style>
</head>
<body>

<canvas id="sp-particles"></canvas>
<div class="clouds"><div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div></div>
<div class="ground-strip"></div>

<div class="spec-page">

  <div class="spec-header">
    <div>
      <div class="spec-title">🏃 FASTER THAN THE T?</div>
      <div class="spec-sub">spectator view · live race</div>
    </div>
    <div class="spec-live"><div class="ldot"></div>LIVE</div>
  </div>

  <div class="spec-speed-card" id="sp-speed-card">
    <div>
      <div id="sp-big">0.0</div>
      <div class="sp-kmh" id="sp-kmh">0.0 km/h</div>
      <div class="sp-ms"  id="sp-ms">0.00 m/s</div>
    </div>
    <div class="sp-rank">
      <span id="sp-rnk-emoji">🧍</span>
      <span class="sp-rnk-lbl">VS</span>
      <span id="sp-rnk-name">STANDING</span>
    </div>
  </div>

  <div class="sp-trains">

    <!-- GREEN -->
    <div class="sp-train-card tc-g">
      <div class="sp-train-top">
        <span class="sp-train-name">🟢 GREEN LINE · 13 km/h</span>
        <span class="sp-gap-chip" id="sp-gap-g" style="background:rgba(0,0,0,.3);color:rgba(255,255,255,.7)">…</span>
      </div>
      <div class="sp-scene" id="sp-scene-g">
        <div class="sp-rail-bed"></div><div class="sp-ties"></div>
        <div class="sp-rfill" id="sp-rfill-g" style="width:0%"></div>
        <div class="sp-rail-t"></div><div class="sp-rail-b"></div>
        <div class="sp-finish"></div><div class="sp-finish-flag">🏁</div>
        <div class="sp-mover sp-train" id="sp-mt-g" style="left:0px"><div class="sp-mtag">13 km/h</div><span class="sp-mover-emoji">🚃</span></div>
        <div class="sp-mover sp-you"   id="sp-my-g" style="left:0px"><div class="sp-mtag" id="sp-you-tag-g">0 km/h</div><span class="sp-mover-emoji">🏃</span></div>
      </div>
    </div>

    <!-- RED -->
    <div class="sp-train-card tc-r">
      <div class="sp-train-top">
        <span class="sp-train-name">🔴 RED LINE · 32 km/h</span>
        <span class="sp-gap-chip" id="sp-gap-r" style="background:rgba(0,0,0,.3);color:rgba(255,255,255,.7)">…</span>
      </div>
      <div class="sp-scene" id="sp-scene-r">
        <div class="sp-rail-bed"></div><div class="sp-ties"></div>
        <div class="sp-rfill" id="sp-rfill-r" style="width:0%"></div>
        <div class="sp-rail-t"></div><div class="sp-rail-b"></div>
        <div class="sp-finish"></div><div class="sp-finish-flag">🏁</div>
        <div class="sp-mover sp-train" id="sp-mt-r" style="left:0px"><div class="sp-mtag">32 km/h</div><span class="sp-mover-emoji">🚇</span></div>
        <div class="sp-mover sp-you"   id="sp-my-r" style="left:0px"><div class="sp-mtag" id="sp-you-tag-r">0 km/h</div><span class="sp-mover-emoji">🏃</span></div>
      </div>
    </div>

    <!-- ORANGE -->
    <div class="sp-train-card tc-o">
      <div class="sp-train-top">
        <span class="sp-train-name">🟠 ORANGE LINE · 38 km/h</span>
        <span class="sp-gap-chip" id="sp-gap-o" style="background:rgba(0,0,0,.3);color:rgba(255,255,255,.7)">…</span>
      </div>
      <div class="sp-scene" id="sp-scene-o">
        <div class="sp-rail-bed"></div><div class="sp-ties"></div>
        <div class="sp-rfill" id="sp-rfill-o" style="width:0%"></div>
        <div class="sp-rail-t"></div><div class="sp-rail-b"></div>
        <div class="sp-finish"></div><div class="sp-finish-flag">🏁</div>
        <div class="sp-mover sp-train" id="sp-mt-o" style="left:0px"><div class="sp-mtag">38 km/h</div><span class="sp-mover-emoji">🚊</span></div>
        <div class="sp-mover sp-you"   id="sp-my-o" style="left:0px"><div class="sp-mtag" id="sp-you-tag-o">0 km/h</div><span class="sp-mover-emoji">🏃</span></div>
      </div>
    </div>

  </div>
</div>

<script>
/* PARTICLES */
const c2 = document.getElementById('sp-particles');
const x2 = c2.getContext('2d');
c2.width = window.innerWidth; c2.height = window.innerHeight;
const pts = [];
function spawnBurst2(x,y,col,n=16) {
  for(let i=0;i<n;i++){
    const a=(Math.PI*2/n)*i+Math.random()*.5, sp=3+Math.random()*5;
    pts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,life:1,decay:.025+Math.random()*.015,r:4+Math.random()*5,color:col});
  }
}
function dp2(){
  x2.clearRect(0,0,c2.width,c2.height);
  for(let i=pts.length-1;i>=0;i--){
    const p=pts[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=.18; p.vx*=.97; p.life-=p.decay;
    if(p.life<=0){pts.splice(i,1);continue;}
    x2.globalAlpha=p.life; x2.fillStyle=p.color;
    x2.beginPath(); x2.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); x2.fill();
  }
  x2.globalAlpha=1; requestAnimationFrame(dp2);
}
dp2();

/* CONFIG */
const TRAINS=[
  {id:'g',trainMs:3.61, color:'#00ff87'},
  {id:'r',trainMs:8.9,  color:'#ff6b6b'},
  {id:'o',trainMs:10.5, color:'#ffb347'},
];
const MAX_MS=110.4, RACE_LEN=30000;
let curMs=0, raceStart=performance.now();
const prevAhead={};

function speedToX(ms,frac,w){
  const usable=w-80, dist=ms*frac, maxD=MAX_MS*frac||.001;
  return Math.min((dist/maxD)*usable,usable-15)+8;
}

function raceTick(){
  const frac=Math.min((performance.now()-raceStart)/RACE_LEN,1);
  TRAINS.forEach(({id,trainMs,color})=>{
    const scene=document.getElementById(`sp-scene-${id}`); if(!scene)return;
    const w=scene.offsetWidth;
    const youX=speedToX(curMs,frac,w), tX=speedToX(trainMs,frac,w);
    const my=document.getElementById(`sp-my-${id}`), mt=document.getElementById(`sp-mt-${id}`);
    if(my) my.style.left=youX+'px';
    if(mt) mt.style.left=tX+'px';
    const fill=document.getElementById(`sp-rfill-${id}`);
    if(fill) fill.style.width=Math.max(0,((tX-8)/(w-80))*100)+'%';
    const tag=document.getElementById(`sp-you-tag-${id}`);
    if(tag) tag.textContent=(curMs*3.6).toFixed(1)+' km/h';
    const gap=document.getElementById(`sp-gap-${id}`);
    const ahead=youX>tX;
    if(ahead){
      gap.style.background='#ffe44d'; gap.style.color='#222'; gap.textContent='🏆 AHEAD!';
      if(!prevAhead[id]){
        const r=scene.getBoundingClientRect();
        spawnBurst2(r.left+youX,r.top+40,color,16);
        const card=document.getElementById('sp-speed-card');
        card.classList.remove('shake'); void card.offsetWidth; card.classList.add('shake');
      }
      prevAhead[id]=true;
    } else {
      const gMs=trainMs-curMs;
      gap.style.background='rgba(0,0,0,.4)'; gap.style.color='rgba(255,255,255,.7)';
      gap.textContent=gMs<.3?'⚡ CLOSE!': gMs.toFixed(1)+' m/s behind';
      prevAhead[id]=false;
    }
  });
  if(frac>=1) raceStart=performance.now();
  requestAnimationFrame(raceTick);
}

function updateUI(ms){
  const kmh=ms*3.6;
  document.getElementById('sp-big').textContent=kmh.toFixed(1);
  document.getElementById('sp-kmh').textContent=kmh.toFixed(1)+' km/h';
  document.getElementById('sp-ms').textContent=ms.toFixed(2)+' m/s';
  const big=document.getElementById('sp-big');
  if(ms>=10.5)      big.style.color='#e879f9';
  else if(ms>=8.9)  big.style.color='#ff6b6b';
  else if(ms>=3.61) big.style.color='#00ff87';
  else if(ms>=2.7)  big.style.color='#60a5fa';
  else              big.style.color='#fff';
  let re='🧍',rn='STANDING';
  if(ms>=10.5){re='🚊';rn='ORANGE LINE'}
  else if(ms>=8.9){re='🚇';rn='RED LINE'}
  else if(ms>=3.61){re='🚃';rn='GREEN LINE'}
  else if(ms>=2.7){re='🏃';rn='JOGGING'}
  document.getElementById('sp-rnk-emoji').textContent=re;
  document.getElementById('sp-rnk-name').textContent=rn;
}

/* ─────────────────────────────────────────────────
   SINGLE SPEED ENTRY POINT
   curMs is only ever written here — nothing else
   touches it directly.
───────────────────────────────────────────────── */
function setSpeed(ms){
  if(!isFinite(ms)||ms<0) return;
  curMs=ms;   // ← the ONE place curMs is written
  updateUI(ms);
}

async function poll(){
  try{
    const r=await fetch('/api/distance'), d=await r.json();
    setSpeed(parseFloat(d.distance??d.speed??0));
  }catch(_){}
}

/* BOOT */
setSpeed(0);
requestAnimationFrame(raceTick);
setInterval(poll,500);
</script>
</body>
</html>
